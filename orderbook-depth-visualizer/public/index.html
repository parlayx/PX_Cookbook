<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ParlayX orderbook depth visualizer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Orderbook depth visualizer</h1>
      <div class="status">
        <span id="mode" class="badge">connecting</span>
        <span id="conn" class="dot"></span>
        <span id="rate" class="muted">0 frames/s</span>
      </div>
    </header>
    <main id="panels"></main>
    <script src="/app.js"></script>
  </body>
</html>
